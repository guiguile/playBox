<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GoT-Page</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>GoT-Page</GoT-Page></h1>
  <main class="container">
    <section class="list-panel">
      <h2>Characters</h2>
      <div id="list"></div>

    </section>

    <section class="detail-panel">
      <h2>Character Details</h2>
      <img id="detail-image"
          src=""
          alt="GoT Character Image"      
      >
      <p><strong>Name: </strong><span id="detail-fullname"></span></p>
      <p><strong>Title: </strong><span id="detail-title"></span></p>
      <p><strong>Family: </strong><span id="detail-family"></span></p>
    </section>
  </main>



  <script src="app.js"></script>
</body>
</html>
